name: Hyderabad Buy/Sell Tracker

on:
  schedule:
    # Every 30 minutes, all day, every day.
    # GitHub Actions cron is UTC. The script itself restricts results to
    # "today" (UTC calendar day) via ONLY_TODAY in tracker.py, so posts from
    # previous days are never reported even if a run is late or missed.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}   # lets you manually trigger a run from the Actions tab

permissions:
  contents: write   # needed so the workflow can commit seen_ids.json back

concurrency:
  group: hyd-tracker
  cancel-in-progress: false   # never cancel a run mid-way; let it finish and commit

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run tracker
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python3 tracker.py

      - name: Commit updated seen_ids.json and report.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_ids.json report.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update tracker state [skip ci]"
            git push
          fi
