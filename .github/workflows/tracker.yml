name: Hyderabad Buy/Sell Tracker

on:
  # Triggered externally every 30 minutes via cron-job.org hitting the
  # workflow_dispatch API endpoint, since GitHub's own `schedule:` cron can
  # be delayed by several minutes (especially on free-tier repos). See:
  # https://api.github.com/repos/David-Outis/hyd-buysell-tracker/actions/workflows/tracker.yml/dispatches
  workflow_dispatch: {}   # also lets you manually trigger a run from the Actions tab

permissions:
  contents: write   # needed so the workflow can commit seen_ids.json back

concurrency:
  group: hyd-tracker
  cancel-in-progress: false   # never cancel a run mid-way; let it finish and commit

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run tracker
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python3 tracker.py

      - name: Commit updated seen_ids.json and report.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # report.md is just a display artifact regenerated fresh each run,
          # so on conflict it's safe to always take our local copy.
          # seen_ids.json is authoritative STATE though: if another run
          # pushed in between our commit and our push, blindly overwriting
          # it with our own (now-stale) copy would revert post IDs that run
          # just marked "notified" - making them look new again next run
          # and causing the exact same URL to be re-notified. So on
          # conflict we MERGE seen_ids.json instead of clobbering it.

          mkdir -p /tmp/tracker-output
          cp seen_ids.json /tmp/tracker-output/seen_ids.json
          cp report.md /tmp/tracker-output/report.md

          git add seen_ids.json report.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update tracker state [skip ci]"

          for i in 1 2 3 4 5; do
            if git push; then
              echo "Push succeeded"
              exit 0
            fi

            echo "Push rejected, syncing with remote and retrying ($i/5)..."

            # Abandon any in-progress rebase/merge from a previous failed
            # attempt so this stays a clean, repeatable loop.
            git rebase --abort 2>/dev/null || true
            git merge --abort 2>/dev/null || true

            git fetch origin main

            # Grab the remote's current seen_ids.json before resetting our
            # working tree, so we have both sides available to merge.
            git show origin/main:seen_ids.json > /tmp/tracker-output/remote_seen_ids.json || echo "{}" > /tmp/tracker-output/remote_seen_ids.json

            git reset --hard origin/main

            # report.md has no state semantics - just take our freshly
            # generated local copy.
            cp /tmp/tracker-output/report.md report.md

            # Merge seen_ids.json: union of post IDs from both files. An ID
            # present on both sides keeps whichever entry is "notified"
            # (never downgrade an already-notified entry back to unseen),
            # otherwise whichever has the later timestamp wins.
          python3 <<'PYEOF'
          import json

          def load(path):
              try:
                  with open(path, "r", encoding="utf-8") as f:
                      return json.load(f)
              except (OSError, json.JSONDecodeError):
                  return {}

          def ts(entry):
              return entry.get("last_seen") or entry.get("first_seen") or ""

          local = load("/tmp/tracker-output/seen_ids.json")
          remote = load("/tmp/tracker-output/remote_seen_ids.json")

          merged = dict(remote)
          for pid, entry in local.items():
              existing = merged.get(pid)
              if existing is None:
                  merged[pid] = entry
                  continue
              existing_notified = existing.get("state") == "notified"
              entry_notified = entry.get("state") == "notified"
              if existing_notified and not entry_notified:
                  continue
              if entry_notified and not existing_notified:
                  merged[pid] = entry
              elif ts(entry) >= ts(existing):
                  merged[pid] = entry

          with open("seen_ids.json", "w", encoding="utf-8") as f:
              json.dump(merged, f, indent=2, sort_keys=True)

          print(f"Merged {len(local)} local + {len(remote)} remote -> {len(merged)} entries")
          PYEOF

            git add seen_ids.json report.md
            if git diff --cached --quiet; then
              echo "Remote already has equivalent/newer state; nothing to commit"
              exit 0
            fi
            git commit -m "Update tracker state [skip ci]"

            sleep $((RANDOM % 10 + 1))
          done

          echo "Push failed after retries"
          exit 1
