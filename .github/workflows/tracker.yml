name: Hyderabad Buy/Sell Tracker

on:
  schedule:
    # Every 30 minutes, all day, every day.
    # GitHub Actions cron is UTC. The script itself restricts results to
    # "today" (UTC calendar day) via ONLY_TODAY in tracker.py, so posts from
    # previous days are never reported even if a run is late or missed.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}   # lets you manually trigger a run from the Actions tab

permissions:
  contents: write   # needed so the workflow can commit seen_ids.json back

concurrency:
  group: hyd-tracker
  cancel-in-progress: false   # never cancel a run mid-way; let it finish and commit

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run tracker
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python3 tracker.py

      - name: Commit updated seen_ids.json and report.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # seen_ids.json and report.md are fully regenerated every run, so
          # there is nothing meaningful to line-by-line merge if two runs
          # land close together. On a push rejection, we don't rebase/merge:
          # we just fetch the latest remote state and re-apply our freshly
          # generated files on top of it, then commit and push again.

          mkdir -p /tmp/tracker-output
          cp seen_ids.json /tmp/tracker-output/seen_ids.json
          cp report.md /tmp/tracker-output/report.md

          git add seen_ids.json report.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update tracker state [skip ci]"

          for i in 1 2 3 4 5; do
            if git push; then
              echo "Push succeeded"
              exit 0
            fi

            echo "Push rejected, syncing with remote and retrying ($i/5)..."

            # Abandon any in-progress rebase/merge from a previous failed 
            # attempt so this stays a clean, repeatable loop.
            git rebase --abort 2>/dev/null || true
            git merge --abort 2>/dev/null || true

            git fetch origin main
            git reset --hard origin/main

            # Re-apply our own generated output on top of the latest remote
            # state instead of merging diffs.
            cp /tmp/tracker-output/seen_ids.json seen_ids.json
            cp /tmp/tracker-output/report.md report.md

            git add seen_ids.json report.md
            if git diff --cached --quiet; then
              echo "Remote already has equivalent/newer state; nothing to commit"
              exit 0
            fi
            git commit -m "Update tracker state [skip ci]"

            sleep $((RANDOM % 10 + 1))
          done

          echo "Push failed after retries"
          exit 1
